apiVersion: v1
kind: Pod
metadata:
  name: django-migrate
spec:
  restartPolicy: Never
  containers:
    - name: django-migrate
      image: django_app:latest
      imagePullPolicy: Never
      command: ["python", "manage.py", "migrate"]
      env:
        - name: DEBUG
          value: "FALSE"
        - name: ALLOWED_HOSTS
          value: "star-burger.test,localhost,127.0.0.1"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secret
              key: SECRET_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: django-secret
              key: DATABASE_URL